services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages/shared/src:/app/packages/shared/src
      - ./prisma:/app/prisma
      - ./data:/app/data
      - ./backups:/var/backups/pdv
    env_file:
      - .env
    environment:
      - DATABASE_URL=file:/app/data/data.db
      - NODE_ENV=development
    networks:
      - pdv-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on: []

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./packages/shared/src:/app/packages/shared/src
    environment:
      - NODE_ENV=development
    networks:
      - pdv-network
    depends_on:
      - api

networks:
  pdv-network:
    driver: bridge

